version: '3'

vars:
  BIN: bin/familyplanner

tasks:
  gen:
    desc: Generate templ + sqlc code
    cmds:
      - templ generate
      - sqlc generate

  spa:
    desc: Build the kiosk SPA client (Go -> WebAssembly) into the embedded assets
    env:
      GOOS: js
      GOARCH: wasm
    cmds:
      - go build -o internal/web/assets/app.wasm ./cmd/kioskspa

  build:
    desc: Build the server binary
    deps: [gen, spa]
    cmds:
      - go build -o {{.BIN}} ./cmd/server

  run:
    desc: Run the server
    deps: [gen, spa]
    cmds:
      - go run ./cmd/server

  dev:
    desc: Live-reload dev server (regenerates templ on change)
    cmds:
      - templ generate --watch --proxy=http://localhost:8080 --cmd="go run ./cmd/server"

  vet:
    cmds:
      - go vet ./...

  test:
    desc: Run unit + integration tests (race detector; needs a C compiler)
    deps: [gen]
    cmds:
      - go test -race -cover ./...

  test:norace:
    desc: Tests without the race detector (Windows without gcc)
    deps: [gen]
    cmds:
      - go test -cover ./...

  test:ui:
    desc: Synthetic browser (Playwright) UI tests for the kiosk SPA + PWA
    deps: [build]
    dir: test/ui
    cmds:
      - npm install --no-audit --no-fund
      - node run.mjs

  ci:
    desc: Mirror of CI - generate, verify, vet, test
    cmds:
      - templ generate
      - sqlc generate
      - git diff --exit-code
      - go vet ./...
      - go test -race -cover ./...

  tidy:
    cmds:
      - go mod tidy
